# ─── Server ───────────────────────────────────────────────
server.port=8080
server.tomcat.max-http-form-post-size=10KB
server.tomcat.max-swallow-size=10KB
spring.servlet.multipart.max-file-size=10KB
spring.servlet.multipart.max-request-size=10KB

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/subtrak
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000
app.jwt.issuer=subtrak
app.jwt.audience=subtrak-api

# ─── Exchange Rate API ─────────────────────────────────────
app.fx.api-key=${FX_API_KEY:placeholder}
app.fx.base-url=https://v6.exchangerate-api.com/v6
app.fx.refresh-rate-ms=3600000

# ─── CORS ─────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:5501,http://localhost:5501

# ─── Logging ──────────────────────────────────────────────
logging.level.com.subtrak=INFO
logging.level.org.springframework.security=WARN
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false

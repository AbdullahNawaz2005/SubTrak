# ─── Server ───────────────────────────────────────────────
server.port=${PORT:8080}
server.tomcat.max-http-form-post-size=10KB
server.tomcat.max-swallow-size=10KB
spring.servlet.multipart.max-file-size=10KB
spring.servlet.multipart.max-request-size=10KB

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/subtrak}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:default-dev-secret-change-in-production-min-32-chars}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000
app.jwt.issuer=subtrak
app.jwt.audience=subtrak-api

# ─── Exchange Rate API ─────────────────────────────────────
app.fx.api-key=${FX_API_KEY:placeholder}
app.fx.base-url=https://v6.exchangerate-api.com/v6
app.fx.refresh-rate-ms=3600000

# ─── CORS ─────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500,https://subtrak-app.onrender.com}

# ─── Logging ──────────────────────────────────────────────
logging.level.com.subtrak=INFO
logging.level.org.springframework.security=WARN
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false

# ─── Actuator Health ──────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SubTrak | Login</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#1b1b25",
                        "on-primary-fixed-variant": "#5a00c6",
                        "on-primary-fixed": "#25005a",
                        "inverse-surface": "#e4e1f0",
                        "on-tertiary-fixed": "#001a42",
                        "surface-dim": "#12121d",
                        "inverse-primary": "#732ee4",
                        "primary-container": "#7c3aed",
                        "outline": "#958da1",
                        "tertiary-fixed-dim": "#adc6ff",
                        "secondary": "#4cd7f6",
                        "primary": "#d2bbff",
                        "tertiary": "#adc6ff",
                        "on-surface-variant": "#ccc3d8",
                        "primary-fixed-dim": "#d2bbff",
                        "on-tertiary-fixed-variant": "#004395",
                        "primary-fixed": "#eaddff",
                        "on-tertiary-container": "#dce5ff",
                        "on-secondary-container": "#00424e",
                        "on-primary-container": "#ede0ff",
                        "surface-variant": "#34343f",
                        "surface": "#12121d",
                        "on-secondary-fixed": "#001f26",
                        "secondary-fixed-dim": "#4cd7f6",
                        "surface-container-high": "#292934",
                        "on-primary": "#3f008e",
                        "tertiary-container": "#0062d2",
                        "surface-bright": "#393844",
                        "secondary-fixed": "#acedff",
                        "secondary-container": "#03b5d3",
                        "surface-container-lowest": "#0d0d17",
                        "surface-tint": "#d2bbff",
                        "error-container": "#93000a",
                        "on-tertiary": "#002e6a",
                        "on-secondary": "#003640",
                        "inverse-on-surface": "#302f3b",
                        "surface-container": "#1f1f2a",
                        "on-surface": "#e4e1f0",
                        "on-secondary-fixed-variant": "#004e5c",
                        "background": "#12121d",
                        "on-background": "#e4e1f0",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#d8e2ff",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "outline-variant": "#4a4455",
                        "surface-container-highest": "#34343f"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #080812;
            background-image: 
                radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(3, 181, 211, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(124, 58, 237, 0.03) 0px, transparent 70%);
            color: #e4e1f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(27, 27, 37, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(74, 68, 85, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 60px -15px rgba(124, 58, 237, 0.15);
        }
        .input-field {
            background: rgba(13, 13, 23, 0.8);
            border: 1px solid rgba(74, 68, 85, 0.4);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: rgba(124, 58, 237, 0.6);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15),
                        0 0 20px -5px rgba(124, 58, 237, 0.3);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(124, 58, 237, 0.5);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(124, 58, 237, 0.3);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 250px;
            height: 250px;
            background: rgba(3, 181, 211, 0.25);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 150px;
            height: 150px;
            background: rgba(124, 58, 237, 0.2);
            top: 50%;
            right: 10%;
            animation-delay: -10s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo-glow {
            filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.5));
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen overflow-hidden relative">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="glass-card rounded-3xl p-10 w-full max-w-md mx-4 fade-in relative z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-[#7c3aed] to-[#03b5d3] mb-6 logo-glow">
                <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
            </div>
            <h1 class="text-4xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-[#7c3aed] to-[#03b5d3] font-headline logo-glow">SubTrak</h1>
            <p class="text-sm text-slate-400 mt-2 font-body">Welcome back to the Celestial Engine</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-wider text-slate-400 mb-2 font-label">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    required
                    class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 font-body"
                    placeholder="your@email.com"
                />
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider text-slate-400 mb-2 font-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    required
                    class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 font-body"
                    placeholder="••••••••"
                />
            </div>

            <div id="error-message" class="hidden text-red-400 text-sm text-center py-2 px-4 bg-red-500/10 rounded-lg border border-red-500/20"></div>

            <button 
                type="submit" 
                id="submit-btn"
                class="btn-primary w-full py-4 rounded-xl text-white font-semibold text-sm uppercase tracking-wider flex items-center justify-center gap-2"
            >
                <span id="btn-text">Login</span>
                <div id="btn-spinner" class="spinner hidden"></div>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-400 text-sm font-body">
                Don't have an account? 
                <a href="register.html" class="text-primary-container hover:text-primary transition-colors font-medium">Register</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE = window.SUBTRAK_CONFIG?.API_BASE || 'http://localhost:8080';

        document.addEventListener('DOMContentLoaded', () => {
            const auth = localStorage.getItem('subtrak_auth');
            if (auth) {
                window.location.href = 'dashboard.html';
                return;
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const errorMessage = document.getElementById('error-message');

            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.textContent = 'Logging in...';
            btnSpinner.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Invalid email or password');
                }

                localStorage.setItem('subtrak_auth', JSON.stringify(data));
                window.location.href = 'dashboard.html';

            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                btnText.textContent = 'Login';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
